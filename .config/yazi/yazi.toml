[mgr]
show_hidden = true

[preview]
wrap = "yes"
tab_size = 2

[opener]
edit = [
  { run = '[ -w "$@" ] && nvim -O"$n" "$@" || sudo -E nvim -O"$n" "$@"', desc = "Edit", block = true },
]

diff = [
  { run = 'nvim -d "$@"', desc = "Diff", block = true },
]

exec = [
  { run = 'bash "$@"', desc = "Bash", block = true },
]

wine = [
  { run = 'wine "$@"', desc = "Wine", block = true },
]

java = [
  { run = 'java -jar "$@"', desc = "Launch jar", block = true },
]

xnb = [
  { run = '"$@"', desc = "Unzip xnb", block = false },
]

swww = [
  { run = 'swww img -t none "$@"', desc = "Set as wallpaper", block = false },
]

[open]
prepend_rules = [
  { name = "*.exe",  use = "wine" },
  { name = "*.jar",  use = "java" },
  { name = "*.xnb",  use = "xnb" },
]

append_rules = [
  { name = "*", use = "diff" },
  { name = "*.sh", use = "exec" },

  { mime = "application/executable", use = "exec" },
  { mime = "text/shellscript", use = "exec" },
  { mime = "image/*", use = "swww" },
]
