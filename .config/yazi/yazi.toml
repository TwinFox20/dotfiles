[mgr]
show_hidden = true
sort_by = "mtime"
sort_reverse = true

[preview]
wrap = "yes"
tab_size = 2

[opener]
edit = [
  { run = '[ -w "$@" ] && nvim -O"$n" "$@" || sudo -E nvim -O"$n" "$@"', desc = "Edit", block = true },
]

view = [
  { run = 'nvim -d "$@"', desc = "Diff", block = true },
]

exec = [
  { run = 'zsh "$@"', desc = "Zsh", block = true }
]

wine = [
  { run = 'wine "$@"', desc = "Wine", block = true },
]

java = [
  { run = 'java -jar "$@"', desc = "Launch jar", block = true },
]

[open]
prepend_rules = [
  { name = "*.sh",   use = [ "edit", "view", "exec" ] },
  { name = "*.exe",  use = [ "wine" ] },
  { name = "*.jar",  use = [ "open", "java" ] },
]
